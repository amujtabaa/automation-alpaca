# No build-system section on purpose: this is an application repo, not an
# installable package. This file only configures the test runner.

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
# Async tests use the bundled anyio plugin (see conftest.py at the repo root for
# the asyncio-only backend fixture). Unit tests remain IO-free (Rule 9).
# Coverage is NOT in addopts on purpose: a bare `pytest tests/test_x.py` for one
# file shouldn't trip the whole-suite floor. CI runs `pytest --cov=app
# --cov-branch` explicitly (see .github/workflows/ci.yml); the floor below then
# applies.
# A leaked/unclosed sqlite connection (F-008) surfaces as a ResourceWarning at
# GC; promote it to an error so a future fixture that forgets to close its store
# fails the suite instead of warning quietly.
#
# AIR-011: on Python 3.13+ an unraisable ResourceWarning (one raised inside a
# GC'd object's __del__, e.g. sqlite3.Connection) is delivered by pytest's
# unraisableexception plugin WRAPPED in ``PytestUnraisableExceptionWarning`` —
# which is NOT a ``ResourceWarning`` subclass, so the plain ``error::
# ResourceWarning`` filter alone would let a leaked connection escape on newer
# Pythons. Promote the wrapper to an error too so the leak fails the suite on
# every Python version, not just 3.12.
filterwarnings = [
    "error::ResourceWarning",
    "error::pytest.PytestUnraisableExceptionWarning",
]

[tool.coverage.run]
source = ["app"]
branch = true

[tool.coverage.report]
show_missing = true
# Floor set a few points under the current ~95% branch coverage so it catches a
# real regression without flaking on normal churn. It is a RATCHET: raise it as
# coverage improves; never lower it silently to make a red build pass.
fail_under = 93

[tool.ruff]
# The .ai-os/ (AI Project OS package) and .claude/ (ClaudeFast kit) trees are
# VENDORED tooling with their own upstream style — not this repo's application
# code — so `ruff check .` must not lint them. app/, tests/, cockpit/, harness/,
# and conftest.py remain fully linted.
extend-exclude = [".ai-os", ".claude"]

[tool.mypy]
# ADR-007: static typecheck gate over app/, introduced by baseline-and-ratchet.
python_version = "3.11"
ignore_missing_imports = true      # alpaca-py / streamlit ship no stubs
plugins = ["pydantic.mypy"]
warn_unused_ignores = false        # future tightening: flip to true after burn-down

# Third-party transitive stubs — `alpaca-py` (imported by the broker adapter and
# the market-data stream) pulls in pandas / pyarrow / numpy, whose modern wheels
# ship inline `.pyi` stubs written with PEP 695 `type` statements. Under
# `python_version = "3.11"` mypy 2.x parses those stubs and hard-errors
# ("Type statement is only supported in Python 3.12 and greater"), which stops
# the whole `mypy app/` run before it checks our code — a pure dependency-drift
# break (unpinned mypy/numpy), not a defect in `app/`. We never typecheck these
# libraries (already expressed by `ignore_missing_imports` above), so tell mypy
# not to follow into them. Surgical: `app/` uses none of them directly, so this
# cannot change how our own code is checked. (Root fix is pinning deps — see
# work/review/FINDING-flatten-inv034-live-protection.md §"Secondary issue".)
[[tool.mypy.overrides]]
module = ["numpy.*", "pandas.*", "pyarrow.*"]
follow_imports = "skip"
follow_imports_for_stubs = true

# Grandfather punch-list (ADR-007): the 16 modules carrying pre-existing type
# debt are ignored so the gate is green today; NEW modules are checked, and this
# list only SHRINKS — burn down safety-critical stores first. Mirrors the
# import-linter ignore-list + coverage fail_under ratchets already used here.
[[tool.mypy.overrides]]
ignore_errors = true
module = [
  "app.features", "app.protection", "app.policy",
  "app.reconciliation", "app.strategy",
  "app.broker.alpaca_paper", "app.broker.factory",
  "app.marketdata.alpaca_stream", "app.marketdata.factory", "app.marketdata.fake",
  "app.facade.store_backed", "app.api.routes_dev",
]
