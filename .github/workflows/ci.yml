name: CI

# Runs the full test suite with a coverage gate on every push and PR.
# Integration tests (tests/integration/) are skipif-gated on ALPACA_PAPER_API_KEY
# / ALPACA_PAPER_API_SECRET, which are not set here, so they skip automatically —
# CI never opens a network connection to Alpaca (Rule 9/10). alpaca-py IS
# installed (from requirements.txt) so the mocked SDK-boundary unit tests run and
# keep app/marketdata/ and app/broker/ covered.

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.11 and 3.12 are both exercised locally (both bytecode caches exist);
        # keep both green so a version-specific regression is caught.
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        # constraints.txt pins the full resolved dependency closure so a fresh
        # runner can't silently drift (a mypy 2.x + numpy 2.5 drift once turned the
        # `mypy app/` gate red before pytest even ran). requirements.txt still
        # declares WHAT we depend on; constraints.txt freezes WHICH versions.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -c constraints.txt
      - name: Lint (ruff)
        # CLAUDE.md §8 lint gate. Fails the build on any lint error so the
        # previously-unenforced ruff debt cannot re-accumulate.
        run: ruff check .
      - name: Typecheck (mypy)
        # ADR-007 gate. Green today under the pyproject [tool.mypy] baseline-and-
        # ratchet; fails the build on a NEW type error in any non-grandfathered module.
        run: mypy app/
      - name: Check import boundaries
        # Spine v2 Phase 5 (CLAUDE.md §5/§8, ADR-005/006): a PR that crosses a
        # protected architectural boundary fails CI here. Runs before the suite so
        # a boundary break is reported as its own clear step, not buried in pytest
        # output (the same contracts are ALSO asserted by
        # tests/test_import_boundaries.py, so the gate holds even if this step is
        # ever removed).
        run: lint-imports
      - name: Run tests with coverage
        # --cov-branch + the fail_under floor in pyproject [tool.coverage.report]
        # gate the build; a real coverage regression fails here.
        run: pytest --cov=app --cov-branch --cov-report=term-missing
