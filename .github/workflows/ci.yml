name: CI

# Runs the full test suite with a coverage gate on every push and PR.
# Integration tests (tests/integration/) are skipif-gated on ALPACA_PAPER_API_KEY
# / ALPACA_PAPER_API_SECRET, which are not set here, so they skip automatically —
# CI never opens a network connection to Alpaca (Rule 9/10). alpaca-py IS
# installed (from requirements.txt) so the mocked SDK-boundary unit tests run and
# keep app/marketdata/ and app/broker/ covered.

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.11 and 3.12 are both exercised locally (both bytecode caches exist);
        # keep both green so a version-specific regression is caught.
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        # constraints.txt pins the full resolved dependency closure so a fresh
        # runner can't silently drift (a mypy 2.x + numpy 2.5 drift once turned the
        # `mypy app/` gate red before pytest even ran). requirements.txt still
        # declares WHAT we depend on; constraints.txt freezes WHICH versions.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -c constraints.txt
      - name: Lint (ruff)
        # CLAUDE.md §8 lint gate. Fails the build on any lint error so the
        # previously-unenforced ruff debt cannot re-accumulate.
        run: ruff check .
      - name: Typecheck (mypy)
        # ADR-007 gate. Green today under the pyproject [tool.mypy] baseline-and-
        # ratchet; fails the build on a NEW type error in any non-grandfathered module.
        run: mypy app/
      - name: Check import boundaries
        # Spine v2 Phase 5 (CLAUDE.md §5/§8, ADR-005/006): a PR that crosses a
        # protected architectural boundary fails CI here. Runs before the suite so
        # a boundary break is reported as its own clear step, not buried in pytest
        # output (the same contracts are ALSO asserted by
        # tests/test_import_boundaries.py, so the gate holds even if this step is
        # ever removed).
        run: lint-imports
      - name: No out-of-scope tooling trees (contamination guard)
        # REV-0029 NEW-P1-2: a stale clone twice re-merged 403 tracked files under
        # .agents/ and .codex/ (ClaudeFast/Codex tooling, ~91k lines, outside every
        # work order's allowed_paths). .gitignore lists both, but an ignore only
        # blocks NEW untracked adds — it cannot untrack files reintroduced through
        # merge ancestry or a forced `git add`. This gate fails the build if either
        # tree becomes tracked again, or if the ignore entries go missing, so the
        # contamination cannot silently return regardless of how it is re-added.
        run: |
          tracked=$(git ls-files .agents .codex)
          if [ -n "$tracked" ]; then
            echo "::error::Out-of-scope tooling files are tracked again (REV-0029 NEW-P1-2 contamination). Remove them with: git rm -r .agents .codex"
            printf '%s\n' "$tracked" | head
            exit 1
          fi
          for entry in '.agents/' '.codex/'; do
            if ! grep -qxF "$entry" .gitignore; then
              echo "::error::.gitignore is missing the '$entry' ignore entry — restore it so the tooling trees cannot re-accumulate."
              exit 1
            fi
          done
          echo "contamination guard: clean (no tracked .agents/.codex; ignore entries present)"
      - name: Work-order and knowledge hygiene (AI-OS)
        # CLAUDE.md close-out rule ("close-out ships with the work"): finished work
        # must land WITH its disposition, ledger entry, and file move — stale
        # bookkeeping (a CLOSED work order parked in work/queue|active|review, a
        # bad ledger row, broken PKL frontmatter, an install drift) fails the
        # build instead of rotting silently. The disposition checker only WARNS on
        # parked-completed orders (OS-package behavior, kept unforked); this step
        # promotes that warning to a failure, which is the repo's ratchet.
        run: |
          python .ai-os/scripts/check_install.py
          python .ai-os/scripts/check_version_consistency.py
          python .ai-os/scripts/check_ledger.py
          python .ai-os/scripts/check_pkl.py pkl/
          out=$(python .ai-os/scripts/check_work_order_disposition.py)
          echo "$out"
          if printf '%s\n' "$out" | grep -q '^WARNING'; then
            echo "::error::Completed work order(s) parked in a live work/ folder — close-out must ship in the same commit as the work (CLAUDE.md close-out rule)."
            exit 1
          fi
      - name: Run R2 conformance oracle
        # The spec oracle intentionally keeps its historical filename, which
        # default pytest discovery does not collect. Run it explicitly so all
        # 61 observable R2 ownership/safety cases gate every push and PR.
        run: python -m pytest -q tests/r2_conformance_oracle.py
      - name: Run tests with coverage
        # --cov-branch + the fail_under floor in pyproject [tool.coverage.report]
        # gate the build; a real coverage regression fails here.
        run: pytest --cov=app --cov-branch --cov-report=term-missing
